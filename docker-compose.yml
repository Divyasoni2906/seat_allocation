version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ethara
      POSTGRES_PASSWORD: ethara
      POSTGRES_DB: ethara
    ports:
      - "5432:5432"
    volumes:
      - ethara_pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://ethara:ethara@db:5432/ethara
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  ethara_pg_data:
